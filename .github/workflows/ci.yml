name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build workspace
        run: nix develop -c cargo build --workspace --locked

      - name: Build minimal firmware
        run: nix develop -c cargo build -p rp1-example-minimal --release --target thumbv7m-none-eabi --locked
